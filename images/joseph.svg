<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbea" />
      <stop offset="100%" stop-color="#e8f5e9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" stroke="#c8e6c9" stroke-width="4"/>
  
  <!-- Dream Stars (Joseph the dreamer) -->
  <path d="M 40 40 L 43 48 L 51 48 L 45 53 L 47 61 L 40 56 L 33 61 L 35 53 L 29 48 L 37 48 Z" fill="#ffd54f" opacity="0.7"/>
  <path d="M 160 60 L 162 65 L 167 65 L 163 68 L 165 73 L 160 70 L 155 73 L 157 68 L 153 65 L 158 65 Z" fill="#ffd54f" opacity="0.7"/>
  <path d="M 140 30 L 141 34 L 145 34 L 142 36 L 143 40 L 140 38 L 137 40 L 138 36 L 135 34 L 139 34 Z" fill="#ffd54f" opacity="0.6"/>

  <!-- Coat of many colors -->
  <!-- Base Coat -->
  <path d="M 50 180 C 50 120, 150 120, 150 180 Z" fill="#ffadad"/>
  <!-- Stripes -->
  <path d="M 60 180 C 60 125, 140 125, 140 180 Z" fill="#ffd6a5"/>
  <path d="M 70 180 C 70 130, 130 130, 130 180 Z" fill="#fdffb6"/>
  <path d="M 80 180 C 80 135, 120 135, 120 180 Z" fill="#caffbf"/>
  <path d="M 90 180 C 90 145, 110 145, 110 180 Z" fill="#9bf6ff"/>
  <path d="M 98 180 L 98 150 L 102 150 L 102 180 Z" fill="#a0c4ff"/>

  <!-- Collar -->
  <path d="M 75 125 Q 100 145 125 125 Q 100 135 75 125 Z" fill="#ffffff" stroke="#bdbdbd" stroke-width="2"/>
  
  <!-- Neck -->
  <rect x="92" y="115" width="16" height="15" fill="#ffe0bd" />
  
  <!-- Head (Face) -->
  <circle cx="100" cy="85" r="35" fill="#ffe0bd" filter="url(#shadow)"/>
  
  <!-- Hair (Dark Brown, neat) -->
  <path d="M 60 85 C 60 30, 140 30, 140 85 C 135 60, 110 55, 100 55 C 90 55, 65 60, 60 85 Z" fill="#4e342e"/>
  <!-- Front Hair -->
  <path d="M 85 55 Q 95 65 105 55 Q 95 50 85 55 Z" fill="#4e342e"/>
  
  <!-- Ears -->
  <circle cx="65" cy="85" r="6" fill="#f5d0a9"/>
  <circle cx="135" cy="85" r="6" fill="#f5d0a9"/>

  <!-- Eyes (Wise and bright) -->
  <ellipse cx="85" cy="85" rx="4" ry="5" fill="#3e2723"/>
  <ellipse cx="115" cy="85" rx="4" ry="5" fill="#3e2723"/>
  <!-- Eye Sparkles -->
  <circle cx="86" cy="83" r="1.5" fill="#ffffff"/>
  <circle cx="116" cy="83" r="1.5" fill="#ffffff"/>

  <!-- Cheeks -->
  <ellipse cx="75" cy="95" rx="7" ry="4" fill="#ff8a80" opacity="0.5"/>
  <ellipse cx="125" cy="95" rx="7" ry="4" fill="#ff8a80" opacity="0.5"/>

  <!-- Nose -->
  <path d="M 98 90 Q 100 93 102 90" fill="none" stroke="#d7ccc8" stroke-width="2" stroke-linecap="round"/>

  <!-- Smile (Gentle and confident) -->
  <path d="M 90 100 Q 100 108 110 100" fill="none" stroke="#3e2723" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Hands holding a scroll (Wisdom/Bible) -->
  <!-- Scroll -->
  <rect x="70" y="145" width="60" height="15" rx="7.5" fill="#fff9c4" stroke="#d4e157" stroke-width="2"/>
  <line x1="80" y1="145" x2="80" y2="160" stroke="#d4e157" stroke-width="2"/>
  <line x1="120" y1="145" x2="120" y2="160" stroke="#d4e157" stroke-width="2"/>
  
  <!-- Hands -->
  <circle cx="85" cy="152" r="7" fill="#ffe0bd"/>
  <circle cx="115" cy="152" r="7" fill="#ffe0bd"/>
</svg>
